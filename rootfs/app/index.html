<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome – Content under /app</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f6f7f9;
      }
      .card {
        background: #fff;
        padding: 2rem 2.5rem;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,.08);
        max-width: 720px;
        text-align: center;
      }
      h1 { margin: 0 0 .5rem; font-size: 1.6rem; }
      p { margin: .25rem 0 0; color: #444; }
      a { color: #0b5fff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      code { background: rgba(0,0,0,.05); padding: .15rem .35rem; border-radius: 6px; }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0d12; }
        .card { background: #11151b; color: #e6ebf3; }
        p { color: #c7cfdb; }
        code { background: #1b2330; }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Your website goes here</h1>
      <p>
        Please place your website files in the
        <code>/app</code> directory.
      </p>
      <p>
        <a href="/app/">Open the /app directory</a>
      </p>
    </main>
  </body>
  
</html>
